<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Đổi Quà Của Thư</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --cream: #FFFDD0; --pink-soft: #FFB7C5; --pink-dark: #FF8DA1; --green: #2ed573; --blue: #3498db; }
        body { font-family: 'Quicksand', sans-serif; background-color: var(--cream); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 90%; max-width: 380px; text-align: center; border: 4px solid var(--pink-soft); z-index: 2; }
        h1 { color: var(--pink-dark); font-size: 24px; }
        
        input { width: 100%; padding: 12px; border: 2px solid var(--pink-soft); border-radius: 12px; outline: none; font-size: 16px; font-weight: bold; text-align: center; color: var(--pink-dark); box-sizing: border-box; margin-bottom: 20px; }
        
        button.btn-main { width: 100%; background: var(--pink-dark); color: white; border: none; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }

        #result { display: none; margin-top: 20px; padding: 15px; border-radius: 12px; animation: pop 0.4s ease; }
        .success { background: #f0fff4; border: 2px dashed var(--green); color: #1e8e49; }
        .error { background: #fff5f5; border: 2px dashed #ff4757; color: #ff4757; }

        .card-box { font-size: 22px; font-weight: bold; letter-spacing: 2px; margin: 10px 0; padding: 10px; background: white; border-radius: 8px; border: 1px solid #ddd; }
        .btn-nav { display: block; text-decoration: none; background: var(--blue); color: white; padding: 10px; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 14px; }
        
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎁 Đổi Quà</h1>
        <p style="font-size: 14px; color: #666;">Nhập mã code để nhận card điện thoại nha!</p>
        
        <input type="text" id="coupon" placeholder="Nhập mã tại đây..." autocomplete="off">
        <button class="btn-main" onclick="redeem()">Xác nhận đổi quà</button>

        <div id="result"></div>
    </div>

    <script>
        function redeem() {
            const code = document.getElementById('coupon').value.trim().toLowerCase();
            const res = document.getElementById('result');
            
            if (code === "chucmungsinhnhat20") {
                res.className = "success";
                res.innerHTML = `
                    <div style="font-weight: bold;">Chúc mừng! Mã thẻ của bạn là:</div>
                    <div class="card-box" id="cardCode">123</div>
                    <button onclick="copyCard()" style="background:#747d8c; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px;">Sao chép mã</button>
                    <a href="https://napthe.vn" target="_blank" class="btn-nav">Đến trang Napthe.vn 🚀</a>
                `;
                res.style.display = "block";
            } else {
                res.className = "error";
                res.innerHTML = `<b>Bạn đã nhập sai!</b><br><small>Vui lòng nhập lại chính xác mã từ vòng quay.</small>`;
                res.style.display = "block";
            }
        }

        function copyCard() {
            const code = document.getElementById('cardCode').innerText;
            navigator.clipboard.writeText(code).then(() => alert("Đã copy mã thẻ: " + code));
        }
    </script>
</body>
</html>
